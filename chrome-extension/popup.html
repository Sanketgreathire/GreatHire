<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GreatHire Talent Sourcer</title>
  <style>
    body {
      width: 350px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .logo {
      font-size: 40px;
      margin-bottom: 10px;
    }
    
    h1 {
      font-size: 18px;
      margin: 0;
      color: #333;
    }
    
    .subtitle {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }
    
    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 13px;
    }
    
    .status.connected {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .status.disconnected {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .instructions {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 15px;
    }
    
    .instructions h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #333;
    }
    
    .instructions ol {
      margin: 0;
      padding-left: 20px;
    }
    
    .instructions li {
      margin-bottom: 8px;
    }
    
    .button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .button:hover {
      transform: translateY(-2px);
    }
    
    .button:active {
      transform: translateY(0);
    }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }
    
    .stat-card {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }
    
    .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }
    
    .stat-label {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🎯</div>
    <h1>GreatHire Talent Sourcer</h1>
    <div class="subtitle">Extract profiles from LinkedIn, Naukri, Indeed</div>
  </div>
  
  <div id="status" class="status disconnected">
    ⚠️ Not logged in to GreatHire
  </div>
  
  <div class="instructions">
    <h3>📋 How to Use:</h3>
    <ol>
      <li>Login to GreatHire platform</li>
      <li>Browse LinkedIn/Naukri/Indeed</li>
      <li>Click the floating button on the page</li>
      <li>Profiles auto-save to your account!</li>
    </ol>
  </div>
  
  <button id="extractBtn" class="button">
    Extract Profiles from Current Page
  </button>
  
  <div class="stats">
    <div class="stat-card">
      <div class="stat-number" id="todayCount">0</div>
      <div class="stat-label">Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="totalCount">0</div>
      <div class="stat-label">Total</div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
